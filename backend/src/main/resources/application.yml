server:
  port: ${SERVER_PORT:8000}

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/traffic_db}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:password}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: ${SPRING_FLYWAY_LOCATIONS:classpath:db/migration}
  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}
      repositories:
        enabled: false
  jackson:
    property-naming-strategy: SNAKE_CASE
    serialization:
      write-dates-as-timestamps: false

app:
  env: ${APP_ENV:development}
  jwt:
    secret: ${JWT_SECRET:change-this-dev-secret-change-this-dev-secret}
    access-token-expire-days: ${ACCESS_TOKEN_EXPIRE_DAYS:7}
  security:
    cors-allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,http://localhost:5174,http://127.0.0.1:5174}
    ws-allow-query-token: ${APP_WS_ALLOW_QUERY_TOKEN:true}
  init-admin:
    enabled: ${INIT_ADMIN:false}
    username: ${INIT_ADMIN_USERNAME:}
    email: ${INIT_ADMIN_EMAIL:}
    password: ${INIT_ADMIN_PASSWORD:}
  network:
    base-url-api: ${BASE_URL_API:http://localhost:8000}
  maas:
    default-client-name: ${APP_MAAS_DEFAULT_CLIENT_NAME:default-dev-client}
    default-api-key: ${APP_MAAS_DEFAULT_API_KEY:dev-maas-key-change-me}
  traffic:
    roads: ${TRAFFIC_ROADS:陈兴道路,陈富路,阮惠路,黎利路,阮廌路}
  db:
    primary: ${APP_DB_PRIMARY:postgres}
    mirror-write: ${APP_DB_MIRROR_WRITE:false}
    redis-cache-enabled: ${APP_REDIS_CACHE_ENABLED:true}
    cache-ttl-seconds: ${APP_CACHE_TTL_SECONDS:10}
    mirror:
      mysql:
        enabled: ${APP_DB_MIRROR_MYSQL_ENABLED:false}
        url: ${APP_DB_MIRROR_MYSQL_URL:}
        username: ${APP_DB_MIRROR_MYSQL_USERNAME:}
        password: ${APP_DB_MIRROR_MYSQL_PASSWORD:}
      postgres:
        enabled: ${APP_DB_MIRROR_POSTGRES_ENABLED:false}
        url: ${APP_DB_MIRROR_POSTGRES_URL:}
        username: ${APP_DB_MIRROR_POSTGRES_USERNAME:}
        password: ${APP_DB_MIRROR_POSTGRES_PASSWORD:}
