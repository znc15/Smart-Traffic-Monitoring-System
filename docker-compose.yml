services:
  database:
    image: postgres:16
    container_name: database
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-odoo}
      POSTGRES_DB: transportation_system
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d transportation_system"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - mynet
  mysql:
    image: mysql:8.4
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: transportation_system_mysql
      MYSQL_USER: traffic
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-traffic}
    ports:
      - "127.0.0.1:3307:3306"
    volumes:
      - mysqldata:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks:
      - mynet
  redis:
    image: redis:alpine
    container_name: redis
    ports:
      - "127.0.0.1:6380:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - mynet
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        MAVEN_BASE_IMAGE: ${MAVEN_BASE_IMAGE:-docker.m.daocloud.io/library/maven:3.9.9-eclipse-temurin-17}
        JRE_BASE_IMAGE: ${JRE_BASE_IMAGE:-docker.m.daocloud.io/library/eclipse-temurin:17-jre}
        MAVEN_MIRROR_URL: ${MAVEN_MIRROR_URL:-https://maven.aliyun.com/repository/public}
        MAVEN_MIRROR_ID: ${MAVEN_MIRROR_ID:-aliyun-public}
    container_name: backend
    ports:
      - "8000:8000"
    environment:
      SERVER_PORT: ${SERVER_PORT:-8000}
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:postgresql://database:5432/transportation_system}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-${POSTGRES_PASSWORD:-odoo}}
      SPRING_FLYWAY_LOCATIONS: ${SPRING_FLYWAY_LOCATIONS:-classpath:db/migration}
      JWT_SECRET: ${JWT_SECRET:-change-this-dev-secret-change-this-dev-secret}
      ACCESS_TOKEN_EXPIRE_DAYS: ${ACCESS_TOKEN_EXPIRE_DAYS:-7}
      APP_ENV: ${APP_ENV:-development}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-${GATEWAY_PUBLIC_BASE:-http://localhost:5173}}
      APP_WS_ALLOW_QUERY_TOKEN: ${APP_WS_ALLOW_QUERY_TOKEN:-true}
      BASE_URL_API: ${BASE_URL_API:-${BACKEND_PUBLIC_HTTP_BASE:-http://localhost:8000}}
      TRAFFIC_ROADS: ${TRAFFIC_ROADS:-陈兴道路,陈富路,阮惠路,黎利路,阮廌路}
      INIT_ADMIN: ${INIT_ADMIN:-false}
      INIT_ADMIN_USERNAME: ${INIT_ADMIN_USERNAME:-}
      INIT_ADMIN_EMAIL: ${INIT_ADMIN_EMAIL:-}
      INIT_ADMIN_PASSWORD: ${INIT_ADMIN_PASSWORD:-}
      APP_MAAS_DEFAULT_CLIENT_NAME: ${APP_MAAS_DEFAULT_CLIENT_NAME:-default-dev-client}
      APP_MAAS_DEFAULT_API_KEY: ${MAAS_API_KEY:-dev-maas-key-change-me}
      APP_DB_PRIMARY: ${APP_DB_PRIMARY:-postgres}
      APP_DB_MIRROR_WRITE: ${APP_DB_MIRROR_WRITE:-false}
      APP_DB_MIRROR_MYSQL_ENABLED: ${APP_DB_MIRROR_MYSQL_ENABLED:-false}
      APP_DB_MIRROR_POSTGRES_ENABLED: ${APP_DB_MIRROR_POSTGRES_ENABLED:-false}
      APP_DB_MIRROR_MYSQL_URL: ${APP_DB_MIRROR_MYSQL_URL:-jdbc:mysql://mysql:3306/transportation_system_mysql?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC}
      APP_DB_MIRROR_MYSQL_USERNAME: ${APP_DB_MIRROR_MYSQL_USERNAME:-traffic}
      APP_DB_MIRROR_MYSQL_PASSWORD: ${APP_DB_MIRROR_MYSQL_PASSWORD:-${MYSQL_PASSWORD:-traffic}}
      APP_DB_MIRROR_POSTGRES_URL: ${APP_DB_MIRROR_POSTGRES_URL:-jdbc:postgresql://database:5432/transportation_system}
      APP_DB_MIRROR_POSTGRES_USERNAME: ${APP_DB_MIRROR_POSTGRES_USERNAME:-postgres}
      APP_DB_MIRROR_POSTGRES_PASSWORD: ${APP_DB_MIRROR_POSTGRES_PASSWORD:-${POSTGRES_PASSWORD:-odoo}}
      APP_REDIS_CACHE_ENABLED: ${APP_REDIS_CACHE_ENABLED:-true}
      APP_CACHE_TTL_SECONDS: ${APP_CACHE_TTL_SECONDS:-10}
      SPRING_REDIS_HOST: ${SPRING_REDIS_HOST:-redis}
      SPRING_REDIS_PORT: ${SPRING_REDIS_PORT:-6379}
    depends_on:
      database:
        condition: service_healthy
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/api/v1/site-settings"]
      interval: 15s
      timeout: 5s
      retries: 20
    networks:
      - mynet

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NODE_BASE_IMAGE: ${NODE_BASE_IMAGE:-docker.m.daocloud.io/library/node:20.19.0-alpine}
        NGINX_BASE_IMAGE: ${NGINX_BASE_IMAGE:-docker.m.daocloud.io/library/nginx:1.27-alpine}
        VITE_API_HTTP_BASE: ${BACKEND_PUBLIC_HTTP_BASE:-}
        VITE_API_WS_BASE: ${BACKEND_PUBLIC_WS_BASE:-}
        VITE_AMAP_KEY: ${VITE_AMAP_KEY:-}
        VITE_AMAP_SECURITY_JS_CODE: ${VITE_AMAP_SECURITY_JS_CODE:-}
        VITE_AMAP_SERVICE_HOST: ${VITE_AMAP_SERVICE_HOST:-}
    container_name: frontend
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "ps -ef | grep -q '[n]ginx: master process'"]
      interval: 15s
      timeout: 5s
      retries: 20
    networks:
      - mynet

  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
      args:
        NGINX_BASE_IMAGE: ${NGINX_BASE_IMAGE:-docker.m.daocloud.io/library/nginx:1.27-alpine}
    container_name: gateway
    ports:
      - "5173:80"
    depends_on:
      frontend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "ps -ef | grep -q '[n]ginx: master process'"]
      interval: 15s
      timeout: 5s
      retries: 20
    networks:
      - mynet

networks:
  mynet:

volumes:
  pgdata:
  mysqldata:
  redisdata:


