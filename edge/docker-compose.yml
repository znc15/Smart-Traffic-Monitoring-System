services:
  edge-node:
    build: .
    container_name: edge-node
    restart: unless-stopped
    ports:
      - "8000:8000"

    # Resource limits: 2 CPU cores + 1.5 GB RAM (leave headroom for host OS)
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1.5G
        reservations:
          cpus: "0.5"
          memory: 256M

    environment:
      # Runtime mode: sim (simulated) or camera (real RTSP/device)
      - MODE=sim
      # Detection confidence threshold (lower to compensate small IMGSZ)
      - CONF=0.3
      # Inference frame skip (aggressive skip for weak CPU)
      - FRAME_SKIP=4
      # YOLO input resolution (minimum viable for detection)
      - IMGSZ=160
      # Quantization: INT8 mandatory on industrial PCs
      - QUANTIZE=int8
      # Model file name (auto-downloaded on first run)
      - MODEL=yolov8n.pt
      # Enable OpenVINO acceleration
      - OPENVINO=true
      # Road segment label
      - ROAD_NAME=示例路段-Edge01
      # HTTP port inside container
      - PORT=8000
      # RTSP URL or device index (camera mode only)
      - CAMERA_URL=
      # Disable browser auto-open in container
      - NO_BROWSER=true
      # JPEG encoding quality (low to save bandwidth)
      - JPEG_QUALITY=50
      # Max concurrent MJPEG clients (limit for weak hardware)
      - MAX_MJPEG_CLIENTS=1
      # Uvicorn workers (single worker for low-spec machines)
      - UVICORN_WORKERS=1
      # OpenVINO / OpenMP thread control
      - OMP_NUM_THREADS=2
      - OPENVINO_THREADING=SEQ

    # Reduce disk I/O: mount /tmp as tmpfs (useful for eMMC / slow HDD)
    tmpfs:
      - /tmp:size=64M

    # Suppress noisy container logs
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

    volumes:
      # Persist exported models across rebuilds
      - ./models:/app/models
      # Mount sample files for sim mode
      - ./samples:/app/samples
