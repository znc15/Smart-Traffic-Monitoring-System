<!-- ===== 监控 Tab ===== -->
<div id="tabMonitor" class="tab-content">

  <!-- 模式状态栏 -->
  <div id="modeStatusBar" class="mode-status-bar">
    <div class="mode-status-left">
      <svg id="modeStatusIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="23 7 16 12 23 17 23 7"></polygon><rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect>
      </svg>
      <span id="modeStatusText" style="font-size:0.9rem;font-weight:600;color:#1e293b;">当前模式：模拟模式</span>
      <span id="modeStatusDesc" style="font-size:0.8rem;color:#64748b;">使用示例素材进行推理演示</span>
      <span id="monitorResourceBadge" class="resource-badge medium" title="资源等级">
        <span class="badge-dot"></span>
        <span id="monitorResourceLabel">medium</span>
      </span>
    </div>
    <div class="mode-status-right">
      <button onclick="switchToSim()" id="switchSimBtn" class="mode-switch-btn active">模拟模式</button>
      <button onclick="switchToCamera()" id="switchCameraBtn" class="mode-switch-btn">摄像头模式</button>
    </div>
  </div>

  <div class="grid grid-cols-1 lg:grid-cols-5 gap-6">

    <div class="lg:col-span-3">
      <div class="stream-container border border-slate-200">
        <video id="videoStream" autoplay muted playsinline
               style="width:100%;display:block;min-height:240px;background:#0f172a;border-radius:0.5rem;">
        </video>
        <img id="videoStreamFallback" class="stream-fallback"
             style="width:100%;display:none;min-height:240px;background:#0f172a;border-radius:0.5rem;" alt="实时视频流">
        <div id="streamPlaceholder" class="stream-placeholder" style="display:none;">
          <svg class="w-16 h-16 mb-3 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                  d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"/>
          </svg>
          <p class="text-base font-medium">视频流未连接</p>
          <p class="text-sm text-slate-500 mt-1">等待边缘节点启动...</p>
          <button onclick="VideoRenderer.reconnect()" class="mt-3 px-4 py-1.5 bg-blue-500 hover:bg-blue-600 text-white rounded text-sm transition">
            重新连接
          </button>
        </div>
        <div class="stream-overlay text-xs text-slate-300">
          <span>FPS: <span id="streamFps" class="text-emerald-400 font-mono">--</span></span>
          <span>推理: <span id="streamInference" class="text-sky-400 font-mono">--</span> ms</span>
        </div>
      </div>
    </div>

    <div class="lg:col-span-2 flex flex-col gap-4">

      <div class="grid grid-cols-2 gap-3">
        <div class="card bg-white border border-slate-200 rounded-xl p-4">
          <div class="flex items-center gap-2 mb-2">
            <svg class="w-5 h-5 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M8 17h.01M16 17h.01M3 11l1.5-5A2 2 0 016.4 4h11.2a2 2 0 011.9 1.5L21 11M3 11v5a2 2 0 002 2h14a2 2 0 002-2v-5M3 11h18"/>
            </svg>
            <span class="text-xs text-slate-500">汽车</span>
          </div>
          <p id="countCar" class="text-3xl font-bold text-blue-500">0</p>
          <p class="text-xs text-slate-400 mt-1">当前检测数量</p>
        </div>
        <div class="card bg-white border border-slate-200 rounded-xl p-4">
          <div class="flex items-center gap-2 mb-2">
            <svg class="w-5 h-5 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M5 17a2 2 0 104 0 2 2 0 00-4 0zm10 0a2 2 0 104 0 2 2 0 00-4 0zM7 11l4-6h4l2 6M7 11h10"/>
            </svg>
            <span class="text-xs text-slate-500">摩托/非机动车</span>
          </div>
          <p id="countMotor" class="text-3xl font-bold text-emerald-500">0</p>
          <p class="text-xs text-slate-400 mt-1">当前检测数量</p>
        </div>
        <div class="card bg-white border border-slate-200 rounded-xl p-4">
          <div class="flex items-center gap-2 mb-2">
            <svg class="w-5 h-5 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M13 10V3L4 14h7v7l9-11h-7z"/>
            </svg>
            <span class="text-xs text-slate-500">汽车速度</span>
          </div>
          <p class="text-2xl font-bold text-blue-400"><span id="speedCar">0.0</span>
            <span class="text-sm font-normal text-slate-400 ml-1">km/h</span></p>
        </div>
        <div class="card bg-white border border-slate-200 rounded-xl p-4">
          <div class="flex items-center gap-2 mb-2">
            <svg class="w-5 h-5 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M13 10V3L4 14h7v7l9-11h-7z"/>
            </svg>
            <span class="text-xs text-slate-500">摩托车速度</span>
          </div>
          <p class="text-2xl font-bold text-emerald-400"><span id="speedMotor">0.0</span>
            <span class="text-sm font-normal text-slate-400 ml-1">km/h</span></p>
        </div>
      </div>

      <div class="bg-white border border-slate-200 rounded-xl p-4 flex flex-col gap-3">
        <h3 class="text-sm font-semibold text-slate-700 border-b border-slate-200 pb-2">系统指标</h3>
        <div>
          <div class="flex justify-between text-xs mb-1">
            <span class="text-slate-500">CPU</span>
            <span id="cpuValue" class="font-mono text-slate-700">0%</span>
          </div>
          <div class="w-full h-2 bg-slate-200 rounded-full overflow-hidden">
            <div id="cpuBar" class="progress-bar h-full rounded-full bg-emerald-500" style="width:0%"></div>
          </div>
        </div>
        <div>
          <div class="flex justify-between text-xs mb-1">
            <span class="text-slate-500">内存</span>
            <span id="memValue" class="font-mono text-slate-700">0%</span>
          </div>
          <div class="w-full h-2 bg-slate-200 rounded-full overflow-hidden">
            <div id="memBar" class="progress-bar h-full rounded-full bg-emerald-500" style="width:0%"></div>
          </div>
        </div>
        <div>
          <div class="flex justify-between text-xs mb-1">
            <span class="text-slate-500">GPU</span>
            <span id="gpuValue" class="font-mono text-slate-700">N/A</span>
          </div>
          <div class="w-full h-2 bg-slate-200 rounded-full overflow-hidden">
            <div id="gpuBar" class="progress-bar h-full rounded-full bg-slate-300" style="width:0%"></div>
          </div>
        </div>
        <div class="grid grid-cols-2 gap-3 pt-1 border-t border-slate-200">
          <div class="text-center">
            <p class="text-xs text-slate-500 mb-1">FPS</p>
            <p id="fpsValue" class="text-xl font-bold text-blue-500 font-mono">--</p>
          </div>
          <div class="text-center">
            <p class="text-xs text-slate-500 mb-1">推理时间</p>
            <p class="text-xl font-bold text-amber-500 font-mono"><span id="inferenceValue">--</span><span class="text-xs font-normal text-slate-400 ml-1">ms</span></p>
          </div>
        </div>
      </div>

    </div>
  </div>

  <div class="mt-6 bg-white border border-slate-200 rounded-xl p-4">
    <h3 class="text-sm font-semibold text-slate-700 mb-3">车辆数量趋势</h3>
    <div style="position:relative; height:220px;">
      <canvas id="trendChart"></canvas>
    </div>
  </div>

</div>
