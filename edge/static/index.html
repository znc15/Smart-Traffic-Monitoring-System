<!DOCTYPE html>
<html lang="zh-CN" data-dashboard-version="2026-03-11-v2">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>智能交通监控 - 边缘节点</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="./css/base.css?v=2026-03-11-v2">
  <link rel="stylesheet" href="./css/components.css?v=2026-03-11-v2">
  <link rel="stylesheet" href="./css/pages.css?v=2026-03-11-v2">
</head>
<body class="min-h-screen">

  <!-- 顶部导航栏 -->
  <nav class="bg-blue-500 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between flex-wrap gap-2">
      <div class="flex items-center gap-3">
        <span id="statusDot" class="w-3 h-3 rounded-full bg-green-500 status-online inline-block"></span>
        <h1 class="text-lg font-bold text-white tracking-wide">智能交通监控 - 边缘节点</h1>
      </div>
      <div class="flex items-center gap-4 text-sm text-blue-100">
        <span>模型: <span id="modelName" class="text-white font-mono">--</span></span>
        <span class="hidden sm:inline">|</span>
        <span>运行: <span id="uptime" class="text-white font-mono">00:00:00</span></span>
        <span class="hidden sm:inline">|</span>
        <span id="navModeBadge" class="nav-mode-badge sim">模拟模式</span>
        <button id="navModeToggle" onclick="toggleMode()" class="nav-toggle-btn" title="切换模式">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="17 1 21 5 17 9"></polyline><path d="M3 11V9a4 4 0 0 1 4-4h14"></path>
            <polyline points="7 23 3 19 7 15"></polyline><path d="M21 13v2a4 4 0 0 1-4 4H3"></path>
          </svg>
        </button>
      </div>
    </div>
  </nav>

  <!-- Tab 导航栏 -->
  <div class="max-w-7xl mx-auto px-4 pt-4">
    <div class="tab-bar rounded-t-lg">
      <div class="tab-item active" data-tab="monitor" onclick="switchTab('monitor')">监控</div>
      <div class="tab-item" data-tab="settings" onclick="switchTab('settings')">设置</div>
      <div class="tab-item" data-tab="test" onclick="switchTab('test')">测试</div>
    </div>
  </div>

  <div id="toastContainer" class="toast-container"></div>

  <main id="dashboardContent" class="max-w-7xl mx-auto px-4 py-6">
    <div class="partial-loading">
      正在加载仪表盘模块...
    </div>
  </main>

  <script type="module" src="./js/app.js?v=2026-03-11-v2"></script>
</body>
</html>
